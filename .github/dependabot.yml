version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'ci'
      include: scope
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore'
      include: scope
    labels:
      - dependencies
      - npm
    ignore:
      # Tailwind v4 is a rewrite (CSS-first @theme, @tailwindcss/postcss).
      # Track major upgrades as their own change proposal, not Dependabot.
      - dependency-name: tailwindcss
        update-types: [version-update:semver-major]
