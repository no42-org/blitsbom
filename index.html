<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <title>blitsbom — Pixelperfect SBOM analytics</title>
    <meta
      name="description"
      content="A zero-install browser-only viewer for CycloneDX SBOM files. Nothing leaves your browser."
    />
    <script>
      // Pre-apply the user's saved theme override before paint to avoid a
      // flash of the wrong palette. Mirrors the logic in ThemeToggle.svelte;
      // any failure is silently ignored (file://, private mode, etc.).
      try {
        var t = localStorage.getItem('blitsbom-theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.dataset.theme = t;
        }
      } catch (e) {}
    </script>
  </head>
  <body class="bg-ink-50 text-ink-900 antialiased">
    <div id="app"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
